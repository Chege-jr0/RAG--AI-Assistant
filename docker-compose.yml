

# Defines all the containers we want to run, the frontend and the backend
services: 
  
  backend:
    build: .
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes :
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    container_name: rag-frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
    command: streamlit run frontend.py --server.address 0.0.0.0  